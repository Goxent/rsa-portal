<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="RSA Portal - Practice Management System" />
  <title>RSA Portal - Practice Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Montserrat', 'sans-serif'],
          },
          colors: {
            navy: {
              900: '#0a0e1a',
              800: '#0f172a',
              700: '#1e293b',
              600: '#334155',
            },
            dark: {
              900: '#0a0e1a',
              800: '#0f172a',
              700: '#1e293b',
            },
            brand: {
              50: '#f0f4f8',
              100: '#d9e2ec',
              200: '#bcd0e8',
              300: '#9db8d9',
              400: '#6b9bd1',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#102a43',
              900: '#0a1c2d',
            },
            accent: {
              cyan: '#06b6d4',
              purple: '#8b5cf6',
              pink: '#ec4899',
              gold: '#f59e0b',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
            'slide-in': 'slideIn 0.3s ease-out forwards',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { transform: 'translateY(10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0e1a;
      color: #94a3b8;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(59, 130, 246, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .glass-modal {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(59, 130, 246, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .glass-card {
      background: rgba(30, 41, 59, 0.3);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .glass-input,
    select,
    textarea,
    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="email"],
    input[type="number"],
    input[type="password"] {
      background-color: rgba(15, 23, 42, 0.6) !important;
      border: 1px solid rgba(59, 130, 246, 0.2) !important;
      color: #f1f5f9 !important;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-input:focus,
    select:focus,
    textarea:focus,
    input:focus {
      background-color: rgba(30, 41, 59, 0.8) !important;
      border-color: #2563eb !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .glass-input::placeholder,
    input::placeholder,
    textarea::placeholder {
      color: rgba(148, 163, 184, 0.5) !important;
    }

    select option {
      background-color: #0f172a !important;
      color: #f8fafc !important;
      padding: 12px;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #2563eb, #06b6d4);
      border-radius: 10px;
      border: 2px solid #0f172a;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #3b82f6, #60a5fa);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
